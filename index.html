<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darwin Core Viewer Pro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050806;
    --surface: rgba(17, 22, 17, 0.6);
    --surface-solid: #111611;
    --border: rgba(74, 222, 128, 0.15);
    --border-hover: rgba(74, 222, 128, 0.4);
    --accent: #4ade80;
    --accent-hover: #22c55e;
    --accent2: #86efac;
    --text: #e2f0e2;
    --muted: #8b9d8b;
    --header-bg: rgba(13, 26, 13, 0.85);
    --row-hover: rgba(74, 222, 128, 0.05);
    --tag-bg: rgba(74, 222, 128, 0.1);
  }

  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulseGlow {
    0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.4); }
    70% { box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); }
    100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
  }

  body {
    font-family: 'Syne', sans-serif;
    background: radial-gradient(circle at 15% 50%, rgba(74, 222, 128, 0.06), transparent 35%),
                radial-gradient(circle at 85% 10%, rgba(134, 239, 172, 0.04), transparent 40%),
                var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2.5rem;
    overflow-x: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 3rem;
    animation: fadeInDown 0.6s ease-out;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 1.2rem;
  }

  .logo {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--accent) 0%, #16a34a 100%);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
    box-shadow: 0 4px 20px rgba(74, 222, 128, 0.25);
    color: #fff;
  }

  h1 {
    font-size: 1.8rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  }

  h1 span { 
    background: linear-gradient(to right, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.02em;
  }

  .client-badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    padding: 0.4rem 0.8rem;
    background: rgba(134, 239, 172, 0.1);
    color: var(--accent2);
    border: 1px solid rgba(134, 239, 172, 0.2);
    border-radius: 999px;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .client-badge::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent);
  }

  /* Drop Zone */
  #dropzone {
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 4.5rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    background: var(--surface);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    animation: fadeInUp 0.6s ease-out 0.1s backwards;
  }

  #dropzone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(74,222,128,0.08) 0%, transparent 60%);
    pointer-events: none;
    transition: opacity 0.3s;
  }

  #dropzone:hover, #dropzone.drag-over {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(74, 222, 128, 0.12);
  }
  #dropzone:hover::before, #dropzone.drag-over::before { opacity: 1; }

  #dropzone.drag-over { 
    transform: scale(1.01);
    border-color: var(--accent2);
    background: rgba(17, 22, 17, 0.8);
  }

  .drop-icon {
    font-size: 3rem;
    margin-bottom: 1.2rem;
    display: block;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
    transition: transform 0.3s;
  }
  #dropzone:hover .drop-icon { transform: translateY(-4px); }

  .drop-title {
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.6rem;
  }

  .drop-sub {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .drop-btn {
    display: inline-block;
    margin-top: 1.8rem;
    padding: 0.6rem 1.8rem;
    background: var(--accent);
    color: #050a05;
    border-radius: 8px;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(74, 222, 128, 0.2);
  }
  .drop-btn:hover { 
    background: var(--accent-hover); 
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(74, 222, 128, 0.3);
  }

  #fileInput { display: none; }

  /* Stats bar */
  #statsBar {
    display: none;
    gap: 1rem;
    margin: 1.5rem 0;
    flex-wrap: wrap;
    animation: fadeInUp 0.4s ease-out;
  }

  .stat-pill {
    background: var(--tag-bg);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.4rem 1rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--accent2);
    display: flex; align-items: center; gap: 0.5rem;
    backdrop-filter: blur(4px);
  }

  .stat-pill .label { color: var(--muted); }

  /* File tabs */
  #fileTabs {
    display: none;
    gap: 0.6rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    animation: fadeInUp 0.5s ease-out;
  }

  .tab-btn {
    padding: 0.4rem 1.2rem;
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(4px);
  }

  .tab-btn:hover { background: rgba(74, 222, 128, 0.05); color: var(--text); }

  .tab-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--tag-bg);
    box-shadow: 0 2px 10px rgba(74, 222, 128, 0.1);
  }

  /* Search + filter bar */
  #toolbar {
    display: none;
    gap: 1rem;
    margin-bottom: 1.2rem;
    align-items: center;
    flex-wrap: wrap;
    animation: fadeInUp 0.6s ease-out;
  }

  .search-wrap { position: relative; flex: 1; min-width: 240px; }
  .search-icon {
    position: absolute; left: 0.9rem; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 0.9rem; pointer-events: none;
  }

  #searchInput {
    width: 100%;
    padding: 0.65rem 1rem 0.65rem 2.6rem;
    background: var(--surface-solid);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    outline: none;
    transition: all 0.2s;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
  }
  #searchInput:focus { 
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.1), inset 0 2px 4px rgba(0,0,0,0.2);
  }

  .toolbar-right {
    display: flex; gap: 0.6rem; align-items: center;
  }

  .action-btn {
    padding: 0.65rem 1rem;
    background: var(--surface-solid);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  
  .action-btn:hover { 
    border-color: var(--accent); 
    color: var(--accent);
    background: var(--tag-bg);
  }

  .action-btn.export {
    background: rgba(74, 222, 128, 0.1);
    border-color: rgba(74, 222, 128, 0.3);
    color: var(--accent);
  }
  .action-btn.export:hover {
    background: rgba(74, 222, 128, 0.2);
    box-shadow: 0 2px 8px rgba(74, 222, 128, 0.2);
    transform: translateY(-1px);
  }

  /* Column selector dropdown */
  .col-dropdown-wrap { position: relative; }

  #colDropdown {
    display: none;
    position: absolute;
    right: 0;
    top: calc(100% + 0.5rem);
    z-index: 100;
    background: var(--surface-solid);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.8rem;
    max-height: 320px;
    overflow-y: auto;
    min-width: 220px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
  }
  #colDropdown.open { display: block; animation: fadeInUp 0.2s ease-out; }

  .col-check {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.4rem 0.5rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--text);
    transition: background 0.1s;
  }
  .col-check:hover { background: var(--row-hover); }
  .col-check input { 
    accent-color: var(--accent); 
    cursor: pointer; 
    width: 14px; height: 14px; 
  }

  /* Table */
  #tableWrap {
    display: none;
    overflow-x: auto;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: var(--surface-solid);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    animation: fadeInUp 0.7s ease-out;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }

  thead th {
    background: var(--header-bg);
    padding: 0.8rem 1.2rem;
    text-align: left;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    position: sticky;
    top: 0;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(8px);
    transition: color 0.2s, background 0.2s;
  }

  thead th:hover { color: var(--accent2); background: rgba(20, 40, 20, 0.9); }
  thead th .sort-arrow { margin-left: 6px; opacity: 0.3; transition: opacity 0.2s; }
  thead th.sorted .sort-arrow { opacity: 1; color: var(--accent2); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--row-hover); }

  tbody td {
    padding: 0.7rem 1.2rem;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    max-width: 250px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  tbody td:hover { white-space: normal; word-break: break-all; }

  .cell-empty { color: var(--muted); font-style: italic; opacity: 0.5; }

  /* DwC field highlighting */
  .dwc-key { color: #c084fc; font-weight: 700; }
  .dwc-coord { color: #38bdf8; }
  .dwc-date { color: #fb923c; }
  .dwc-taxon { color: var(--accent); }

  /* Pagination */
  #pagination {
    display: none;
    align-items: center;
    justify-content: space-between;
    margin-top: 1.2rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    flex-wrap: wrap;
    gap: 1rem;
    animation: fadeInUp 0.8s ease-out;
  }

  .page-btns { display: flex; gap: 0.4rem; }

  .page-btn {
    padding: 0.4rem 0.8rem;
    background: var(--surface-solid);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    transition: all 0.2s;
  }

  .page-btn:hover:not(:disabled), .page-btn.active { 
    border-color: var(--accent); 
    color: var(--accent); 
    background: var(--tag-bg);
  }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Error / loading */
  #status {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    margin-top: 1.2rem;
    padding: 0.8rem 1.2rem;
    border-radius: 10px;
    display: none;
    animation: fadeInUp 0.3s ease-out;
  }

  #status.error { background: rgba(220, 38, 38, 0.1); border: 1px solid rgba(220, 38, 38, 0.3); color: #fca5a5; }
  #status.info { background: var(--tag-bg); border: 1px solid var(--border); color: var(--accent2); box-shadow: 0 4px 12px rgba(74, 222, 128, 0.1); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">🌿</div>
    <div>
      <h1>Darwin Core <span>Viewer Pro</span></h1>
      <div class="subtitle">// Web-based DwC-A explorer</div>
    </div>
  </div>
  <div class="client-badge">
    ✓ 100% Client-Side Processing
  </div>
</header>

<!-- Drop zone -->
<div id="dropzone" onclick="document.getElementById('fileInput').click()">
  <span class="drop-icon">📦</span>
  <div class="drop-title">Arrastra tu archivo .zip aquí</div>
  <div class="drop-sub">Darwin Core Archive (.zip) • occurrence, taxon, event…</div>
  <div class="drop-btn">Seleccionar archivo</div>
</div>
<input type="file" id="fileInput" accept=".zip">

<div id="status"></div>

<!-- File tabs -->
<div id="fileTabs"></div>

<!-- Stats bar -->
<div id="statsBar"></div>

<!-- Toolbar -->
<div id="toolbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Buscar en cualquier campo…">
  </div>
  <div class="toolbar-right">
    <button class="action-btn export" onclick="exportData('csv')">CSV ⬇</button>
    <button class="action-btn export" onclick="exportData('xlsx')">Excel ⬇</button>
    <div class="col-dropdown-wrap">
      <button class="action-btn" id="colToggleBtn">Columnas ▾</button>
      <div id="colDropdown"></div>
    </div>
  </div>
</div>

<!-- Table -->
<div id="tableWrap">
  <table id="dataTable">
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- Pagination -->
<div id="pagination"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<!-- SheetJS for client-side Excel export -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

<script>
// ── State ───────────────────────────────────────────────
let allFiles = {};         // filename → [{col:val}]
let currentFile = null;
let visibleCols = [];
let allCols = [];
let filtered = [];
let sortCol = null, sortDir = 1;
let page = 0;
const PAGE_SIZE = 50;

// ── DwC field groups for coloring ────────────────────────
const DWC_GROUPS = {
  key: ['occurrenceid','gbifid','cataloguenumber','recordnumber','eventid','locationid','taxonid','materialentityid'],
  coord: ['decimallatitude','decimallongitude','coordinateuncertaintyinmeters','verbatimlatitude','verbatimlongitude'],
  date: ['eventdate','dateidentified','modified','year','month','day'],
  taxon: ['scientificname','species','genus','family','order','class','phylum','kingdom','taxonrank','vernacularname'],
};

function getColClass(col) {
  const c = col.toLowerCase().replace(/\s/g,'');
  if (DWC_GROUPS.key.includes(c)) return 'dwc-key';
  if (DWC_GROUPS.coord.includes(c)) return 'dwc-coord';
  if (DWC_GROUPS.date.includes(c)) return 'dwc-date';
  if (DWC_GROUPS.taxon.includes(c)) return 'dwc-taxon';
  return '';
}

// ── UI helpers ───────────────────────────────────────────
function showStatus(msg, type='info') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = type;
  el.style.display = 'block';
}
function hideStatus() { document.getElementById('status').style.display = 'none'; }

// ── Parse CSV ────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (!lines.length) return [];
  
  const first = lines[0];
  const delim = (first.split('\t').length > first.split(',').length) ? '\t' : ',';

  function parseLine(line) {
    const fields = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === delim && !inQ) { fields.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    fields.push(cur.trim());
    return fields;
  }

  const headers = parseLine(lines[0]).map(h => h.replace(/^"|"$/g,'').trim());
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = parseLine(lines[i]);
    const obj = {};
    headers.forEach((h, j) => { obj[h] = vals[j] !== undefined ? vals[j].replace(/^"|"$/g,'') : ''; });
    rows.push(obj);
  }
  return rows;
}

// ── Load ZIP ─────────────────────────────────────────────
async function loadZip(file) {
  showStatus('Leyendo archivo y extrayendo datos...', 'info');
  document.getElementById('dropzone').style.display = 'none';
  
  try {
    const zip = await JSZip.loadAsync(file);
    const csvFiles = Object.keys(zip.files).filter(n =>
      (n.endsWith('.csv') || n.endsWith('.txt') || n.endsWith('.tsv')) &&
      !n.startsWith('__MACOSX')
    );

    if (!csvFiles.length) { 
      showStatus('No se encontraron archivos CSV/TXT dentro del ZIP.', 'error'); 
      document.getElementById('dropzone').style.display = 'block';
      return; 
    }

    allFiles = {};
    for (const fname of csvFiles) {
      const text = await zip.files[fname].async('string');
      const rows = parseCSV(text);
      if (rows.length) allFiles[fname] = rows;
    }

    if (!Object.keys(allFiles).length) { 
      showStatus('Los archivos CSV están vacíos.', 'error'); 
      document.getElementById('dropzone').style.display = 'block';
      return; 
    }

    hideStatus();
    buildTabs();

  } catch(e) {
    showStatus('Error al leer el ZIP: ' + e.message, 'error');
    document.getElementById('dropzone').style.display = 'block';
  }
}

// ── Tabs ─────────────────────────────────────────────────
function buildTabs() {
  const keys = Object.keys(allFiles);
  const tabsEl = document.getElementById('fileTabs');
  tabsEl.innerHTML = '';
  tabsEl.style.display = keys.length > 1 ? 'flex' : 'none';

  keys.forEach((k, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    const short = k.split('/').pop();
    btn.textContent = short + ` (${allFiles[k].length.toLocaleString()})`;
    btn.onclick = () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadFile(k);
    };
    tabsEl.appendChild(btn);
  });

  loadFile(keys[0]);
}

// ── Load a specific file into the table ──────────────────
function loadFile(fname) {
  currentFile = fname;
  const rows = allFiles[fname];
  allCols = Object.keys(rows[0]);
  visibleCols = [...allCols];
  page = 0;
  sortCol = null; sortDir = 1;
  document.getElementById('searchInput').value = '';

  buildColDropdown();
  applyFilter();
  updateStats(rows, fname);

  document.getElementById('toolbar').style.display = 'flex';
  document.getElementById('tableWrap').style.display = 'block';
}

// ── Column dropdown ───────────────────────────────────────
function buildColDropdown() {
  const dd = document.getElementById('colDropdown');
  dd.innerHTML = '<div style="font-size:0.65rem;color:var(--muted);margin-bottom:0.6rem;font-family:Space Mono,monospace;font-weight:700;letter-spacing:0.05em">MOSTRAR COLUMNAS</div>';
  allCols.forEach(col => {
    const label = document.createElement('label');
    label.className = 'col-check';
    label.innerHTML = `<input type="checkbox" checked data-col="${col}"> <span>${col}</span>`;
    label.querySelector('input').addEventListener('change', () => {
      const checked = [...dd.querySelectorAll('input:checked')].map(i => i.dataset.col);
      visibleCols = checked;
      page = 0;
      renderTable();
    });
    dd.appendChild(label);
  });
}

document.getElementById('colToggleBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('colDropdown').classList.toggle('open');
});
document.addEventListener('click', () => document.getElementById('colDropdown').classList.remove('open'));
document.getElementById('colDropdown').addEventListener('click', e => e.stopPropagation());

// ── Export functionality (100% Client Side) ──────────────
function exportData(format) {
  if (!filtered.length) return;

  showStatus(`Generando ${format.toUpperCase()}... Por favor espera.`, 'info');

  setTimeout(() => {
    try {
      // Build pure data payload based on visible columns
      const exportRows = filtered.map(row => {
        const out = {};
        visibleCols.forEach(col => { out[col] = row[col]; });
        return out;
      });

      const baseName = currentFile.split('/').pop().replace(/\.[^/.]+$/, "");
      const fileName = `${baseName}_export_${new Date().getTime()}`;

      if (format === 'csv') {
        exportCSV(exportRows, fileName);
      } else if (format === 'xlsx') {
        exportXLSX(exportRows, fileName);
      }
      
      showStatus('¡Descarga iniciada exitosamente!', 'info');
      setTimeout(hideStatus, 3000);
    } catch(err) {
      showStatus('Error al exportar: ' + err.message, 'error');
    }
  }, 100);
}

function exportCSV(data, fileName) {
  const header = visibleCols.map(c => `"${c.replace(/"/g, '""')}"`).join(',');
  const lines = data.map(row => {
    return visibleCols.map(col => {
      const val = row[col] == null ? '' : String(row[col]);
      return `"${val.replace(/"/g, '""')}"`;
    }).join(',');
  });
  const csvContent = [header, ...lines].join('\n');
  const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' }); // \ufeff for Excel UTF-8 BOM
  triggerDownload(blob, `${fileName}.csv`);
}

function exportXLSX(data, fileName) {
  if (typeof XLSX === 'undefined') throw new Error("La librería SheetJS no está cargada");
  const ws = XLSX.utils.json_to_sheet(data, { header: visibleCols });
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "DwC Data");
  XLSX.writeFile(wb, `${fileName}.xlsx`);
}

function triggerDownload(blob, fileName) {
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = fileName;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

// ── Stats bar ─────────────────────────────────────────────
function updateStats(rows, fname) {
  const bar = document.getElementById('statsBar');
  const short = fname.split('/').pop();
  bar.style.display = 'flex';
  bar.innerHTML = `
    <div class="stat-pill"><span class="label">archivo</span> ${short}</div>
    <div class="stat-pill" id="statRows"><span class="label">registros</span> ${rows.length.toLocaleString()}</div>
    <div class="stat-pill"><span class="label">columnas totales</span> ${allCols.length}</div>
  `;
}

// ── Filter + sort + render ────────────────────────────────
function applyFilter() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const rows = allFiles[currentFile];
  filtered = q
    ? rows.filter(r => visibleCols.some(col => r[col] && r[col].toLowerCase().includes(q)))
    : [...rows];

  if (sortCol !== null) {
    filtered.sort((a, b) => {
      const av = a[sortCol] || '', bv = b[sortCol] || '';
      return av.localeCompare(bv, undefined, {numeric:true}) * sortDir;
    });
  }

  const statRows = document.getElementById('statRows');
  if (statRows) statRows.innerHTML = `<span class="label">registros</span> ${filtered.length.toLocaleString()}${q ? ' (filtrados)' : ''}`;

  page = 0;
  renderTable();
}

document.getElementById('searchInput').addEventListener('input', applyFilter);

function renderTable() {
  const thead = document.getElementById('tableHead');
  const tbody = document.getElementById('tableBody');

  // Header
  thead.innerHTML = '<tr>' + visibleCols.map(col => {
    const cls = getColClass(col);
    const arrow = sortCol === col ? (sortDir === 1 ? '↑' : '↓') : '↕';
    const sorted = sortCol === col ? ' sorted' : '';
    return `<th class="${sorted}" onclick="doSort('${col.replace(/'/g,"\\'")}')">
      <span class="${cls}">${col}</span><span class="sort-arrow">${arrow}</span>
    </th>`;
  }).join('') + '</tr>';

  // Rows
  const start = page * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);

  tbody.innerHTML = slice.map(row => '<tr>' + visibleCols.map(col => {
    const val = row[col];
    const cls = getColClass(col);
    if (!val || val === '') return `<td class="cell-empty">—</td>`;
    return `<td title="${val.replace(/"/g,'&quot;')}"><span class="${cls}">${val}</span></td>`;
  }).join('') + '</tr>').join('');

  renderPagination();
}

function doSort(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  applyFilter();
}

function renderPagination() {
  const total = filtered.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const pag = document.getElementById('pagination');

  if (totalPages <= 1) { pag.style.display = 'none'; return; }
  pag.style.display = 'flex';

  const start = page * PAGE_SIZE + 1;
  const end = Math.min((page + 1) * PAGE_SIZE, total);

  let btns = '';
  const range = 2;
  for (let i = 0; i < totalPages; i++) {
    if (i === 0 || i === totalPages-1 || Math.abs(i - page) <= range) {
      btns += `<button class="page-btn${i===page?' active':''}" onclick="goPage(${i})">${i+1}</button>`;
    } else if (Math.abs(i - page) === range+1) {
      btns += `<span style="color:var(--muted);padding:0 4px;font-family:Space Mono,monospace;font-size:0.75rem">…</span>`;
    }
  }

  pag.innerHTML = `
    <span>Mostrando ${start.toLocaleString()} – ${end.toLocaleString()} de ${total.toLocaleString()}</span>
    <div class="page-btns">
      <button class="page-btn" onclick="goPage(${page-1})" ${page===0?'disabled':''}>← Anterior</button>
      ${btns}
      <button class="page-btn" onclick="goPage(${page+1})" ${page===totalPages-1?'disabled':''}>Siguiente →</button>
    </div>
  `;
}

function goPage(p) {
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  if (p < 0 || p >= totalPages) return;
  page = p;
  renderTable();
  document.getElementById('tableWrap').scrollIntoView({behavior:'smooth', block:'start'});
}

// ── Drag & drop ───────────────────────────────────────────
const dz = document.getElementById('dropzone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.name.endsWith('.zip')) loadZip(file);
  else showStatus('Por favor sube un archivo .zip válido.', 'error');
});

document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) loadZip(file);
});
</script>
